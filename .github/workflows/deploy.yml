name: DocuChat CI/CD Pipeline

on:
  push:
    branches: [main]
  # Pipeline will only work if push on main branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Code checkout 
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Python setup 
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      # Step 3: Inatall dependencies and check basics
      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      # Step 4: To login docker hub 
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      # DOCKER_USERNAME and DOCKER_TOKEN will be set in  GitHub Secrets 

      # Step 5: Build docker image and push
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/docuchat:latest

      # Step 6: Trigger deploy on render
      - name: Deploy to Render
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}
      # Render deploy hook URL  to be saved in  GitHub Secrets 